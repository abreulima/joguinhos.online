
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #1a1a18;
    }

    header p {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #6b6b67;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e4e3de;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a18;
      margin-bottom: 3px;
    }

    .card-sub {
      font-size: 13px;
      color: #6b6b67;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 6px;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Jogos</h1>
    <p>Jogos Onlines. Os melhores de Portugal!</p>
  </header>

  <main>
    <div class="grid">

      <div class="card">
        <div class="card-img-placeholder" style="background:#E1F5EE;">🏔️</div>
        <div class="card-body">
          <div class="card-name">Serra da Estrela</div>
          <div class="card-sub">Guarda, Portugal</div>
        </div>
      </div>

      <div class="card">
        <div class="card-img-placeholder" style="background:#E6F1FB;">🏛️</div>
        <div class="card-body">
          <div class="card-name">Mosteiro dos Jerónimos</div>
          <div class="card-sub">Lisboa, Portugal</div>
        </div>
      </div>

      <div class="card">
        <div class="card-img-placeholder" style="background:#FAECE7;">🌊</div>
        <div class="card-body">
          <div class="card-name">Praia do Camilo</div>
          <div class="card-sub">Lagos, Algarve</div>
        </div>
      </div>

      <div class="card">
        <div class="card-img-placeholder" style="background:#FAEEDA;">🍊</div>
        <div class="card-body">
          <div class="card-name">Mercado da Ribeira</div>
          <div class="card-sub">Lisboa, Portugal</div>
        </div>
      </div>

      <div class="card">
        <div class="card-img-placeholder" style="background:#EEEDFE;">🌸</div>
        <div class="card-body">
          <div class="card-name">Parque de Sintra</div>
          <div class="card-sub">Sintra, Portugal</div>
        </div>
      </div>

      <div class="card">
        <div class="card-img-placeholder" style="background:#FCEBEB;">🌅</div>
        <div class="card-body">
          <div class="card-name">Cabo da Roca</div>
          <div class="card-sub">Cascais, Portugal</div>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
