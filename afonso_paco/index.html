<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Climb Higher - Web Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="overlay">
      <div class="panel">
        <div class="kicker">Browser Edition</div>
        <h1>Climb Higher</h1>
        <p>Move, jump, collect the key, survive the castle, and defeat the final boss.</p>
        <p class="small">Controls: A/D or arrows to move, W/Space to jump, left click or J to attack, right click to shield, V for god mode + flight, B to jump to boss, Enter to start.</p>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
