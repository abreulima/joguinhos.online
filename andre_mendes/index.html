<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cocos em Fuga</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #11161a;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    canvas {
      width: min(100vw, calc(100vh * 4 / 3));
      height: min(100vh, calc(100vw * 3 / 4));
      display: block;
      background: #14181c;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>

  <script>
    const WIDTH = 800;
    const HEIGHT = 600;
    const STARTING_PLAYER_HEALTH = 5;

    const COLORS = {
      player: '#1e90ff',
      enemy: '#8b4513',
      item: '#228b22',
      projectile: '#ffd700',
      specialItem: '#46c8ff',
      boss: '#aa1e1e',
      white: '#ffffff'
    };

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const assetFiles = {
      background: 'Artes/fundo.png',
      player: 'Artes/jogador.png',
      playerLeft: 'Artes/jogador1.png',
      playerWalkRight: 'Artes/jogadorandar.png',
      playerWalkLeft: 'Artes/jogadorandar1.png',
      enemy: 'Artes/inimigo.png',
      enemy2: 'Artes/inimigo2.png',
      boss: 'Artes/boss.png',
      item: 'Artes/coletavel.png',
      specialItem: 'Artes/especial.png',
      projectile: 'Artes/arma.png',
      specialProjectile: 'Artes/especial.png',
      life: 'Artes/vida.png',
      objective: 'Artes/objetivo.png'
    };

    const assets = {};
    const keys = new Set();
    const mouse = { x: WIDTH / 2, y: HEIGHT / 2 };
    let state = 'menu';
    let lastFrame = 0;
    let game = null;

    function loadAssets() {
      const entries = Object.entries(assetFiles);
      return Promise.all(entries.map(([name, src]) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          assets[name] = img;
          resolve();
        };
        img.onerror = () => resolve();
        img.src = src;
      })));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max) {
      return Math.floor(rand(min, max + 1));
    }

    function choice(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function dist(a, b, x2 = b.x, y2 = b.y) {
      return Math.hypot(a.x - x2, a.y - y2);
    }

    function drawImageCentered(img, x, y, w, h) {
      if (!img) return false;
      ctx.drawImage(img, Math.round(x - w / 2), Math.round(y - h / 2), w, h);
      return true;
    }

    function drawText(text, x, y, size = 22, align = 'left', color = '#fff') {
      ctx.font = `${size}px Arial, Helvetica, sans-serif`;
      ctx.textAlign = align;
      ctx.textBaseline = 'top';
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
    }

    function buttonRect(x, y, w, h, text) {
      const hovered = mouse.x >= x && mouse.x <= x + w && mouse.y >= y && mouse.y <= y + h;
      ctx.fillStyle = hovered ? '#4682b4' : '#2d5a82';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      roundRect(x, y, w, h, 8, true, true);
      drawText(text, x + w / 2, y + h / 2 - 12, 22, 'center');
      return hovered;
    }

    function roundRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    class Player {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 4;
        this.radius = 16;
        this.health = STARTING_PLAYER_HEALTH;
        this.item = null;
        this.lastThrowTime = -3000;
        this.invincibleUntil = 0;
        this.throwCooldownBonus = 0;
        this.hasBossWeapon = false;
        this.facing = 'right';
        this.walkingSideways = false;
      }

      throwCooldown() {
        if (!this.item) return 0;
        return Math.max(100, this.item.throwCooldown - this.throwCooldownBonus);
      }

      update() {
        let dx = 0;
        let dy = 0;
        this.walkingSideways = false;
        if (keys.has('a') || keys.has('arrowleft')) {
          dx -= 1;
          if (keys.has('a')) {
            this.facing = 'left';
            this.walkingSideways = true;
          }
        }
        if (keys.has('d') || keys.has('arrowright')) {
          dx += 1;
          if (keys.has('d')) {
            this.facing = 'right';
            this.walkingSideways = true;
          }
        }
        if (keys.has('w') || keys.has('arrowup')) dy -= 1;
        if (keys.has('s') || keys.has('arrowdown')) dy += 1;
        if (dx || dy) {
          const length = Math.hypot(dx, dy);
          this.x += this.speed * dx / length;
          this.y += this.speed * dy / length;
        }
        this.x = Math.max(this.radius, Math.min(WIDTH - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(HEIGHT - this.radius, this.y));
      }

      currentSprite(now) {
        if (this.facing === 'left') {
          if (this.walkingSideways && Math.floor(now / 300) % 2 === 1) return assets.playerWalkLeft;
          return assets.playerLeft || assets.player;
        }
        if (this.walkingSideways && Math.floor(now / 300) % 2 === 1) return assets.playerWalkRight;
        return assets.player;
      }

      draw(now) {
        if (now < this.invincibleUntil && Math.floor(now / 120) % 2 === 0) return;
        if (!drawImageCentered(this.currentSprite(now), this.x, this.y, 40, 40)) {
          ctx.fillStyle = COLORS.player;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        if (this.item) {
          let label = this.item.name;
          if (this.item.special) {
            const remaining = Math.max(0, (this.throwCooldown() - (now - this.lastThrowTime)) / 1000);
            label = `${this.item.name} (${remaining.toFixed(1)}s)`;
          }
          drawText(label, 10, HEIGHT - 30, 22);
        }
      }
    }

    class Enemy {
      constructor(x, y, isBoss = false, isEnemy2 = false) {
        this.id = Enemy.nextId++;
        this.x = x;
        this.y = y;
        this.isBoss = isBoss;
        this.isEnemy2 = isEnemy2;
        this.radius = isBoss ? 24 : 14;
        if (isBoss) {
          this.speed = rand(1.95, 2.55);
        } else {
          this.speed = rand(1.0, 2.0) * (isEnemy2 ? 0.75 : 1);
        }
        this.health = isBoss ? 10 : isEnemy2 ? 5 : 3;
        this.lastHitTime = -500;
      }

      takeDamage(amount, now) {
        if (now - this.lastHitTime < 500) return null;
        this.lastHitTime = now;
        this.health -= amount;
        return this.health <= 0;
      }

      update(player) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const length = Math.hypot(dx, dy);
        if (length > 0) {
          this.x += this.speed * dx / length;
          this.y += this.speed * dy / length;
        }
      }

      draw() {
        const img = this.isBoss ? assets.boss : this.isEnemy2 ? assets.enemy2 : assets.enemy;
        const size = this.isBoss ? 72 : this.isEnemy2 ? 38 : 34;
        if (!drawImageCentered(img, this.x, this.y, size, size)) {
          ctx.fillStyle = this.isBoss ? COLORS.boss : COLORS.enemy;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    Enemy.nextId = 1;

    class Item {
      constructor(x, y, name, special = false, throwCooldown = 0) {
        this.x = x;
        this.y = y;
        this.radius = special ? 10 : 8;
        this.name = name;
        this.special = special;
        this.throwCooldown = throwCooldown;
      }

      draw() {
        const img = this.special ? assets.specialItem : assets.item;
        const size = this.special ? 28 : 24;
        if (!drawImageCentered(img, this.x, this.y, size, size)) {
          ctx.fillStyle = this.special ? COLORS.specialItem : COLORS.item;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    class LifePickup {
      constructor(x, y, now) {
        this.x = x;
        this.y = y;
        this.radius = 10;
        this.expiresAt = now + 10000;
      }

      draw() {
        if (!drawImageCentered(assets.life, this.x, this.y, 20, 20)) {
          ctx.fillStyle = '#dc2846';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    class UpgradePickup {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 12;
      }

      draw() {
        ctx.fillStyle = COLORS.projectile;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        drawText('+', this.x, this.y - 12, 22, 'center');
      }
    }

    class Projectile {
      constructor(x, y, tx, ty, damage, special = false) {
        this.x = x;
        this.y = y;
        this.speed = 8;
        this.damage = damage;
        this.special = special;
        this.hitEnemies = new Set();
        this.radius = 5;
        const dx = tx - x;
        const dy = ty - y;
        const length = Math.hypot(dx, dy) || 1;
        this.vx = this.speed * dx / length;
        this.vy = this.speed * dy / length;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
      }

      draw() {
        const img = this.special ? assets.specialProjectile : assets.projectile;
        if (!drawImageCentered(img, this.x, this.y, 20, 20)) {
          ctx.fillStyle = COLORS.projectile;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function spawnEnemy() {
      const isEnemy2 = Math.random() < 0.05;
      const side = choice(['top', 'bottom', 'left', 'right']);
      if (side === 'top') return new Enemy(randInt(0, WIDTH), -20, false, isEnemy2);
      if (side === 'bottom') return new Enemy(randInt(0, WIDTH), HEIGHT + 20, false, isEnemy2);
      if (side === 'left') return new Enemy(-20, randInt(0, HEIGHT), false, isEnemy2);
      return new Enemy(WIDTH + 20, randInt(0, HEIGHT), false, isEnemy2);
    }

    function spawnBoss() {
      const side = choice(['top', 'bottom', 'left', 'right']);
      if (side === 'top') return new Enemy(randInt(0, WIDTH), -30, true);
      if (side === 'bottom') return new Enemy(randInt(0, WIDTH), HEIGHT + 30, true);
      if (side === 'left') return new Enemy(-30, randInt(0, HEIGHT), true);
      return new Enemy(WIDTH + 30, randInt(0, HEIGHT), true);
    }

    function nextEnemySpawnDelay(player) {
      return player.hasBossWeapon ? randInt(500, 1000) : randInt(1000, 2000);
    }

    function randomItem() {
      return choice(['Prego', 'Borracha', 'Liquido', 'Martelo', 'Tesoura']);
    }

    function maybeSpawnUpgradeAfterFirstBoss(x, y) {
      if (game.bossesDefeated < 1) return false;
      if (Math.random() < 0.1) game.upgradePickups.push(new UpgradePickup(x, y));
      return true;
    }

    function newGame() {
      const player = new Player(WIDTH / 2, HEIGHT / 2);
      game = {
        player,
        enemies: Array.from({ length: 5 }, spawnEnemy),
        items: [],
        lifePickups: [],
        upgradePickups: [],
        projectiles: [],
        spawnTimer: 0,
        nextSpawnDelay: nextEnemySpawnDelay(player),
        itemTimer: 0,
        cocoKills: 0,
        highScore: Number(localStorage.getItem('cocosHighScore') || 0),
        bossesDefeated: 0,
        victoryOverlayUntil: 0,
        infiniteMode: false,
        victoryTriggered: false
      };
    }

    function throwItem(now) {
      const player = game.player;
      if (!player.item) return;
      if (player.item.special) {
        if (now - player.lastThrowTime < player.throwCooldown()) return;
        player.lastThrowTime = now;
      }
      game.projectiles.push(new Projectile(player.x, player.y, mouse.x, mouse.y, 1, player.item.special));
      if (!player.item.special) player.item = null;
    }

    function pickupNearbyItem() {
      const player = game.player;
      if (player.item) return;
      const pickupRange = player.radius + 24;
      let best = null;
      let bestDistance = Infinity;
      for (const item of game.items) {
        const distance = Math.hypot(player.x - item.x, player.y - item.y);
        if (distance < pickupRange + item.radius && distance < bestDistance) {
          best = item;
          bestDistance = distance;
        }
      }
      if (!best) return;
      player.item = best;
      if (best.special) player.hasBossWeapon = true;
      game.items = game.items.filter(item => item !== best);
    }

    function chooseUpgrade(choiceName) {
      if (choiceName === 'life') game.player.health += 2;
      if (choiceName === 'speed') game.player.speed *= 1.1;
      if (choiceName === 'cooldown') game.player.throwCooldownBonus += 100;
      state = 'playing';
    }

    function updatePlaying(dt, now) {
      if (game.victoryOverlayUntil && now < game.victoryOverlayUntil) return;
      if (game.victoryOverlayUntil && now >= game.victoryOverlayUntil) {
        game.victoryOverlayUntil = 0;
        game.infiniteMode = true;
      }

      const player = game.player;
      player.update();
      for (const enemy of game.enemies) enemy.update(player);
      for (const projectile of game.projectiles) projectile.update();

      for (const projectile of [...game.projectiles]) {
        for (const enemy of [...game.enemies]) {
          if (projectile.hitEnemies.has(enemy.id)) continue;
          if (Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y) < projectile.radius + enemy.radius) {
            const dead = enemy.takeDamage(projectile.damage, now);
            if (dead === null) continue;
            projectile.hitEnemies.add(enemy.id);
            if (!dead) continue;
            if (enemy.isBoss) {
              game.bossesDefeated += 1;
              if (game.bossesDefeated === 1) {
                game.items.push(new Item(enemy.x, enemy.y, 'Item do Boss', true, 1500));
              } else {
                maybeSpawnUpgradeAfterFirstBoss(enemy.x, enemy.y);
              }
            } else {
              game.cocoKills += 1;
              if (game.cocoKills > game.highScore) {
                game.highScore = game.cocoKills;
                localStorage.setItem('cocosHighScore', String(game.highScore));
              }
              if (game.cocoKills % 10 === 0) {
                if (!maybeSpawnUpgradeAfterFirstBoss(enemy.x, enemy.y) && Math.random() < 0.5) {
                  game.lifePickups.push(new LifePickup(enemy.x, enemy.y, now));
                }
              }
              if (game.cocoKills % 50 === 0 && !game.enemies.some(e => e.isBoss)) {
                game.enemies.push(spawnBoss());
              }
            }
            game.enemies = game.enemies.filter(e => e !== enemy);
          }
        }
      }

      game.lifePickups = game.lifePickups.filter(life => now < life.expiresAt);
      for (const life of [...game.lifePickups]) {
        if (Math.hypot(player.x - life.x, player.y - life.y) < player.radius + life.radius) {
          player.health += 1;
          game.lifePickups = game.lifePickups.filter(item => item !== life);
        }
      }
      for (const upgrade of [...game.upgradePickups]) {
        if (Math.hypot(player.x - upgrade.x, player.y - upgrade.y) < player.radius + upgrade.radius) {
          game.upgradePickups = game.upgradePickups.filter(item => item !== upgrade);
          state = 'upgrade';
          return;
        }
      }

      if (now >= player.invincibleUntil) {
        for (const enemy of game.enemies) {
          if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius) {
            player.health -= 1;
            player.invincibleUntil = now + 2000;
            if (player.health <= 0) state = 'gameover';
            break;
          }
        }
      }

      game.spawnTimer += dt;
      if (game.spawnTimer > game.nextSpawnDelay) {
        game.enemies.push(spawnEnemy());
        game.spawnTimer = 0;
        game.nextSpawnDelay = nextEnemySpawnDelay(player);
      }

      game.itemTimer += dt;
      if (game.itemTimer > 4000) {
        const x = randInt(20, WIDTH - 20);
        const y = randInt(40, HEIGHT - 20);
        if (!maybeSpawnUpgradeAfterFirstBoss(x, y)) {
          game.items.push(new Item(x, y, randomItem()));
        }
        game.itemTimer = 0;
      }

      game.projectiles = game.projectiles.filter(p => p.x >= 0 && p.x <= WIDTH && p.y >= 0 && p.y <= HEIGHT);

      if (game.cocoKills >= 50 && !game.victoryTriggered) {
        game.victoryTriggered = true;
        game.victoryOverlayUntil = now + 3000;
      }
    }

    function drawScene(now) {
      if (!drawImageCentered(assets.background, WIDTH / 2, HEIGHT / 2, WIDTH, HEIGHT)) {
        ctx.fillStyle = '#14181c';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
      }
      if (!game) return;
      for (const item of game.items) item.draw();
      for (const life of game.lifePickups) life.draw();
      for (const upgrade of game.upgradePickups) upgrade.draw();
      for (const enemy of game.enemies) enemy.draw();
      for (const projectile of game.projectiles) projectile.draw();
      game.player.draw(now);
      drawUi(now);
      if (game.victoryOverlayUntil && now < game.victoryOverlayUntil) drawVictory();
      if (game.infiniteMode) drawText('Modo infinito ativo', WIDTH - 10, 34, 22, 'right');
    }

    function drawUi(now) {
      if (drawImageCentered(assets.life, 20, 20, 20, 20)) {
        drawText(`x ${game.player.health}`, 34, 10, 22);
      } else {
        drawText(`Vida: ${game.player.health}`, 10, 10, 22);
      }
      drawText(`Mortos: ${game.cocoKills}`, 10, 30, 22);
      drawText(`High score: ${game.highScore}`, WIDTH - 10, 10, 22, 'right');
      let hint = 'E: apanhar item';
      if (game.player.item) {
        if (game.player.item.special) {
          const remaining = Math.max(0, (game.player.throwCooldown() - (now - game.player.lastThrowTime)) / 1000);
          hint = `E/clique: atirar (${remaining.toFixed(1)}s)`;
        } else {
          hint = 'E/clique: atirar';
        }
      }
      drawText(hint, 10, 50, 22);
    }

    function drawVictory() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      drawImageCentered(assets.objective, WIDTH / 2, HEIGHT / 2 - 74, 42, 42);
      drawText('Vitoria! 50 cocos derrotados.', WIDTH / 2, HEIGHT / 2 - 20, 24, 'center');
      drawText('Modo infinito desbloqueado.', WIDTH / 2, HEIGHT / 2 + 8, 24, 'center');
      drawText(`Cocos abatidos: ${game.cocoKills}`, WIDTH / 2, HEIGHT / 2 + 36, 24, 'center');
    }

    function drawMenuBackground() {
      if (!drawImageCentered(assets.background, WIDTH / 2, HEIGHT / 2, WIDTH, HEIGHT)) {
        ctx.fillStyle = '#12161a';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
      }
      ctx.fillStyle = 'rgba(0,0,0,0.58)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
    }

    function drawMenu() {
      drawMenuBackground();
      drawText('Cocos em Fuga', WIDTH / 2, 130, 56, 'center');
      drawText('Escolhe uma opcao', WIDTH / 2, 195, 24, 'center', '#ebebeb');
      buttonRect(WIDTH / 2 - 110, 265, 220, 56, 'Jogar');
      buttonRect(WIDTH / 2 - 110, 340, 220, 56, 'Tutorial');
    }

    function drawTutorial() {
      drawMenuBackground();
      const lines = [
        'Comandos',
        'WASD ou setas: mover',
        'E perto de um item: apanhar',
        'E ou clique esquerdo com item: atirar',
        'A arma segue a direcao do ponteiro do rato',
        'Os cocos aguentam 3 hits e o boss aguenta 10 hits',
        'Alguns cocos raros sao mais lentos e aguentam 5 hits',
        'Ao apanhar upgrade, escolhes entre vida, velocidade ou cooldown',
        'A cada 10 cocos mortos pode aparecer uma vida por 10 segundos',
        'A cada 50 cocos mortos aparece um boss, se nao houver outro',
        'Quando perderes, carrega em R para reiniciar',
        'Derrota 50 cocos para desbloquear o modo infinito'
      ];
      drawText(lines[0], WIDTH / 2, 80, 56, 'center');
      for (let i = 1; i < lines.length; i += 1) {
        drawText(lines[i], WIDTH / 2, 150 + i * 30, 20, 'center', '#ebebeb');
      }
      buttonRect(WIDTH / 2 - 90, HEIGHT - 75, 180, 48, 'Voltar');
    }

    function drawUpgrade() {
      drawScene(performance.now());
      ctx.fillStyle = 'rgba(0,0,0,0.82)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      drawText('Escolhe upgrade', WIDTH / 2, 150, 56, 'center');
      buttonRect(WIDTH / 2 - 130, 245, 260, 52, '+2 vidas');
      buttonRect(WIDTH / 2 - 130, 315, 260, 52, '+10% velocidade');
      buttonRect(WIDTH / 2 - 130, 385, 260, 52, '-0.1s cooldown');
    }

    function drawGameOver() {
      drawScene(performance.now());
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      drawText('Perdeste! Os cocos triunfam...', WIDTH / 2, HEIGHT / 2 - 28, 24, 'center');
      drawText('Carrega em R para reiniciar', WIDTH / 2, HEIGHT / 2 + 4, 24, 'center');
      drawText('ESC para voltar ao menu', WIDTH / 2, HEIGHT / 2 + 34, 22, 'center', '#ddd');
    }

    function render(now) {
      if (state === 'menu') drawMenu();
      if (state === 'tutorial') drawTutorial();
      if (state === 'playing') drawScene(now);
      if (state === 'upgrade') drawUpgrade();
      if (state === 'gameover') drawGameOver();
    }

    function loop(now) {
      const dt = Math.min(50, now - lastFrame || 16);
      lastFrame = now;
      if (state === 'playing' && game) updatePlaying(dt, now);
      render(now);
      requestAnimationFrame(loop);
    }

    function canvasMousePosition(event) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = (event.clientX - rect.left) * WIDTH / rect.width;
      mouse.y = (event.clientY - rect.top) * HEIGHT / rect.height;
    }

    function startPlaying() {
      newGame();
      state = 'playing';
      if (document.fullscreenEnabled && !document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    canvas.addEventListener('mousemove', canvasMousePosition);
    canvas.addEventListener('mousedown', (event) => {
      canvasMousePosition(event);
      if (state === 'menu') {
        if (mouse.x >= WIDTH / 2 - 110 && mouse.x <= WIDTH / 2 + 110 && mouse.y >= 265 && mouse.y <= 321) startPlaying();
        if (mouse.x >= WIDTH / 2 - 110 && mouse.x <= WIDTH / 2 + 110 && mouse.y >= 340 && mouse.y <= 396) state = 'tutorial';
        return;
      }
      if (state === 'tutorial') {
        if (mouse.x >= WIDTH / 2 - 90 && mouse.x <= WIDTH / 2 + 90 && mouse.y >= HEIGHT - 75 && mouse.y <= HEIGHT - 27) state = 'menu';
        return;
      }
      if (state === 'upgrade') {
        if (mouse.x >= WIDTH / 2 - 130 && mouse.x <= WIDTH / 2 + 130) {
          if (mouse.y >= 245 && mouse.y <= 297) chooseUpgrade('life');
          if (mouse.y >= 315 && mouse.y <= 367) chooseUpgrade('speed');
          if (mouse.y >= 385 && mouse.y <= 437) chooseUpgrade('cooldown');
        }
        return;
      }
      if (state === 'playing' && game && game.player.item) throwItem(performance.now());
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      keys.add(key);
      if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) event.preventDefault();
      if (state === 'menu') {
        if (key === 'enter') startPlaying();
        if (key === 't') state = 'tutorial';
        return;
      }
      if (state === 'tutorial') {
        if (key === 'escape' || key === 'enter') state = 'menu';
        return;
      }
      if (state === 'upgrade') {
        if (key === '1') chooseUpgrade('life');
        if (key === '2') chooseUpgrade('speed');
        if (key === '3') chooseUpgrade('cooldown');
        return;
      }
      if (state === 'gameover') {
        if (key === 'r') startPlaying();
        if (key === 'escape') state = 'menu';
        return;
      }
      if (state === 'playing' && game) {
        if (key === 'e') {
          if (game.player.item) throwItem(performance.now());
          else pickupNearbyItem();
        }
      }
    });

    window.addEventListener('keyup', (event) => {
      keys.delete(event.key.toLowerCase());
    });

    loadAssets().then(() => {
      requestAnimationFrame((now) => {
        lastFrame = now;
        requestAnimationFrame(loop);
      });
    });
  </script>
</body>
</html>
