<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Minecraft JS - Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Consolas,monospace;color:#fff;user-select:none}
canvas{display:block;cursor:none}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:100}
.slot{width:50px;height:50px;background:rgba(0,0,0,.8);border:2px solid #555;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.slot.active{border-color:#fff;border-width:3px}
.slot .qtd{position:absolute;bottom:2px;right:4px;font-size:12px;color:#fff}
.slot .blk{width:36px;height:36px}
#info{position:fixed;top:10px;left:10px;font-size:12px;color:#fff;pointer-events:none;z-index:50;background:rgba(0,0,0,.7);padding:8px}
#inv{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.95);border:3px solid #fff;padding:20px;display:none;pointer-events:auto;z-index:200;max-height:90vh;overflow-y:auto;color:#fff}
#inv.open{display:block}
#inv h2{color:#fff;margin-bottom:15px;text-align:center;font-size:18px}
.inv-grid{display:grid;grid-template-columns:repeat(9,50px);gap:4px;margin-bottom:20px}
.craft-grid{display:grid;grid-template-columns:repeat(3,50px);gap:4px;margin:10px 0}
.inv-slot{width:46px;height:46px;background:#1a1a1a;border:2px solid #444;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.inv-slot.selected{border-color:#fff;background:#333}
.inv-slot .blk{width:32px;height:32px}
.inv-slot .qtd{position:absolute;bottom:1px;right:3px;font-size:11px;color:#fff}
#out-slot{width:60px;height:60px;border:3px solid #fff;display:flex;align-items:center;justify-content:center;margin:15px auto;background:#1a1a1a}
#out-slot .blk{width:48px;height:48px}
button{padding:10px 20px;cursor:pointer;font-family:Consolas,monospace;font-size:14px;background:#333;color:#fff;border:2px solid #fff;display:block;margin:10px auto}
button:hover{background:#555}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">
  <div>WASD mover | ESPACO saltar | R reset | E inventario</div>
  <div>Click esq: quebrar | Click dir: colocar | 1-9: selecionar</div>
  <div id="stats"></div>
</div>
<div id="hud"></div>
<div id="inv">
  <h2>INVENTÁRIO</h2>
  <div class="inv-grid" id="inv-grid"></div>
  <h2 style="font-size:14px;text-align:center;margin-top:20px">CRAFTING</h2>
  <div class="craft-grid" id="craft-grid"></div>
  <div id="out-slot"></div>
  <button id="craft-btn">CRAFTAR</button>
</div>

<script>
'use strict';

// Carregar pilares do minecraft.txt
const PILLARS = [
  'farmer', 'gatherer', 'miner', 'builder', 'crafter', 'explorer', 'survivor', 'architect', 'engineer', 'pioneer'
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const FOV = 75 * Math.PI / 180;
const RD = 30;
const PW = 0.3, PH = 1.7, EYE = 1.5;
const GRAV = 25, JUMP = 8, SPD = 6, SENS = 0.002;

const BLK = [
  null,
  { name: 'Grama', color: '#4CAF50', top: '#66BB6A', side: '#388E3C' },
  { name: 'Terra', color: '#8D6E63', top: '#795548', side: '#5D4037' },
  { name: 'Pedra', color: '#9E9E9E', top: '#BDBDBD', side: '#757575' },
  { name: 'Madeira', color: '#A1887F', top: '#BCAAA4', side: '#8D6E63' },
  { name: 'Folhas', color: '#2E7D32', top: '#388E3C', side: '#1B5E20' },
  { name: 'Tijolo', color: '#D32F2F', top: '#E53935', side: '#B71C1C' },
  { name: 'Tabua', color: '#FFB74D', top: '#FFA726', side: '#F57C00' },
  { name: 'Forno', color: '#424242', top: '#616161', side: '#212121' },
];

const REC = [
  { result: 5, count: 4, need: { 1: 2, 0: 1 } },
  { result: 6, count: 4, need: { 3: 2 } },
  { result: 7, count: 1, need: { 2: 4 } },
];

const world = new Map();
const bk = (x, y, z) => Math.floor(x) + ',' + Math.floor(y) + ',' + Math.floor(z);

function gen() {
  for (let x = -20; x <= 20; x++)
    for (let z = -20; z <= 20; z++) {
      const h = Math.floor(3 + Math.sin(x * 0.3) * 1.5 + Math.cos(z * 0.28) * 1.2 + Math.sin((x + z) * 0.15) * 0.8);
      for (let y = 0; y <= h; y++)
        world.set(bk(x, y, z), y === h ? 1 : y >= h - 2 ? 2 : 3);
      if ((x * x + z * z) % 7 === 0 && Math.abs(x) > 3 && Math.abs(z) > 3 && Math.random() < 0.3) {
        const th = h + 1;
        for (let y = th; y < th + 4; y++) world.set(bk(x, y, z), 3);
        for (let dx = -2; dx <= 2; dx++)
          for (let dz = -2; dz <= 2; dz++)
            for (let dy = 3; dy <= 5; dy++)
              if (Math.abs(dx) + Math.abs(dz) + Math.abs(dy - 4) <= 3) {
                const key = bk(x + dx, th + dy, z + dz);
                if (!world.has(key)) world.set(key, 4);
              }
      }
    }
}

const P = {
  x: 0, y: 10, z: 0, vy: 0, yaw: 0, pitch: 0, ground: false,
  inv: Array.from({ length: 36 }, () => ({ id: 0, q: 0 })),
  hot: [1, 2, 3, 4, 5, 0, 0, 0, 0],
  sel: 0, open: false,
  craft: Array.from({ length: 9 }, () => ({ id: 0, q: 0 })),
  out: null
};
P.inv[0] = { id: 1, q: 20 };
P.inv[1] = { id: 2, q: 20 };
P.inv[2] = { id: 3, q: 10 };
P.inv[3] = { id: 4, q: 10 };

const gB = (x, y, z) => world.get(bk(x, y, z)) || 0;
const sB = (x, y, z, id) => { id === 0 ? world.delete(bk(x, y, z)) : world.set(bk(x, y, z), id); };

function col(x, y, z) {
  const hw = PW / 2;
  for (let ix = Math.floor(x - hw); ix <= Math.floor(x + hw); ix++)
    for (let iy = Math.floor(y); iy <= Math.floor(y + PH); iy++)
      for (let iz = Math.floor(z - hw); iz <= Math.floor(z + hw); iz++)
        if (world.has(bk(ix, iy, iz))) return true;
  return false;
}

function ray(ox, oy, oz, dx, dy, dz, mx) {
  let x = Math.floor(ox), y = Math.floor(oy), z = Math.floor(oz);
  const sx = dx > 0 ? 1 : -1, sy = dy > 0 ? 1 : -1, sz = dz > 0 ? 1 : -1;
  let tx = dx === 0 ? 1e9 : ((dx > 0 ? x + 1 : x) - ox) / dx;
  let ty = dy === 0 ? 1e9 : ((dy > 0 ? y + 1 : y) - oy) / dy;
  let tz = dz === 0 ? 1e9 : ((dz > 0 ? z + 1 : z) - oz) / dz;
  const dx_ = dx === 0 ? 1e9 : Math.abs(1 / dx);
  const dy_ = dy === 0 ? 1e9 : Math.abs(1 / dy);
  const dz_ = dz === 0 ? 1e9 : Math.abs(1 / dz);
  for (let i = 0; i < 80; i++) {
    const key = bk(x, y, z);
    if (world.has(key) && !(x === Math.floor(ox) && y === Math.floor(oy) && z === Math.floor(oz)))
      return { x, y, z, id: world.get(key) };
    if (tx < ty) { if (tx < tz) { x += sx; tx += dx_; } else { z += sz; tz += dz_; } }
    else { if (ty < tz) { y += sy; ty += dy_; } else { z += sz; tz += dz_; } }
    if (tx > mx && ty > mx && tz > mx) break;
  }
  return null;
}

function proj(x, y, z) {
  const dx = x - P.x, dy = y - (P.y + EYE), dz = z - P.z;
  const cy = Math.cos(-P.yaw), sy = Math.sin(-P.yaw);
  const rx = dx * cy - dz * sy, rz = dx * sy + dz * cy;
  const cp = Math.cos(P.pitch), sp = Math.sin(P.pitch);
  const ry = dy * cp - rz * sp, rz2 = dy * sp + rz * cp;
  if (rz2 <= 0.2) return null;
  const d = canvas.width / (2 * Math.tan(FOV / 2));
  return { x: canvas.width / 2 + rx * d / rz2, y: canvas.height / 2 - ry * d / rz2, z: rz2 };
}

function drawB(x, y, z, id) {
  const b = BLK[id]; if (!b) return;
  const v = [
    proj(x, y, z), proj(x + 1, y, z), proj(x + 1, y + 1, z), proj(x, y + 1, z),
    proj(x, y, z + 1), proj(x + 1, y, z + 1), proj(x + 1, y + 1, z + 1), proj(x, y + 1, z + 1)
  ];
  if (v.some(p => !p)) return;

  const faces = [
    { i: [0, 1, 2, 3], ck: bk(x, y, z - 1), nx: 0, ny: 0, nz: -1, top: false },
    { i: [5, 4, 7, 6], ck: bk(x, y, z + 1), nx: 0, ny: 0, nz: 1, top: false },
    { i: [3, 2, 6, 7], ck: bk(x, y + 1, z), nx: 0, ny: 1, nz: 0, top: true },
    { i: [4, 5, 1, 0], ck: bk(x, y - 1, z), nx: 0, ny: -1, nz: 0, top: false },
    { i: [1, 5, 6, 2], ck: bk(x + 1, y, z), nx: 1, ny: 0, nz: 0, top: false },
    { i: [4, 0, 3, 7], ck: bk(x - 1, y, z), nx: -1, ny: 0, nz: 0, top: false },
  ];

  for (const f of faces) {
    if (world.has(f.ck)) continue;
    const ddx = P.x - (x + 0.5), ddy = (P.y + EYE) - (y + 0.5), ddz = P.z - (z + 0.5);
    if (f.nx * ddx + f.ny * ddy + f.nz * ddz <= 0) continue;
    ctx.fillStyle = f.top ? b.top : b.color;
    ctx.beginPath();
    ctx.moveTo(v[f.i[0]].x, v[f.i[0]].y);
    ctx.lineTo(v[f.i[1]].x, v[f.i[1]].y);
    ctx.lineTo(v[f.i[2]].x, v[f.i[2]].y);
    ctx.lineTo(v[f.i[3]].x, v[f.i[3]].y);
    ctx.closePath();
    ctx.fill();
  }
}

function render() {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, w, h);
  const g = ctx.createRadialGradient(w - 100, 60, 5, w - 100, 60, 60);
  g.addColorStop(0, 'rgba(255,250,200,1)');
  g.addColorStop(1, 'rgba(255,200,50,0)');
  ctx.fillStyle = g;
  ctx.fillRect(w - 200, 0, 200, 150);
  for (const [key, id] of world) {
    const p = key.split(',');
    const x = +p[0], y = +p[1], z = +p[2];
    if ((x - P.x) * (x - P.x) + (z - P.z) * (z - P.z) > RD * RD) continue;
    drawB(x, y, z, id);
  }
  const st = document.getElementById('stats');
  if (st) {
    const now = performance.now();
    const fps = Math.round(1000 / Math.max(1, now - lt));
    lt = now;
    st.textContent = 'FPS: ' + fps + ' | XYZ: ' + P.x.toFixed(1) + ' ' + P.y.toFixed(1) + ' ' + P.z.toFixed(1);
  }
}

function updHud() {
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const s = document.createElement('div');
    s.className = 'slot' + (i === P.sel ? ' active' : '');
    const bid = P.hot[i];
    if (bid > 0 && BLK[bid]) {
      const b = document.createElement('div');
      b.className = 'blk';
      b.style.background = BLK[bid].color;
      s.appendChild(b);
    }
    const q = document.createElement('span');
    q.className = 'qtd';
    let t = 0;
    for (const it of P.inv) if (it.id === bid) t += it.q;
    q.textContent = t || '';
    s.appendChild(q);
    s.onclick = () => { P.sel = i; updHud(); };
    hud.appendChild(s);
  }
}

function updInv() {
  const g = document.getElementById('inv-grid');
  g.innerHTML = '';
  for (let i = 0; i < 36; i++) {
    const s = document.createElement('div');
    s.className = 'inv-slot';
    s.style.cssText = 'width:46px;height:46px;background:#1a1a1a;border:2px solid #444;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative';
    const it = P.inv[i];
    if (it.id > 0 && BLK[it.id]) {
      const b = document.createElement('div');
      b.className = 'blk';
      b.style.background = BLK[it.id].color;
      b.style.width = '32px';
      b.style.height = '32px';
      s.appendChild(b);
    }
    if (it.q > 0) {
      const q = document.createElement('span');
      q.className = 'qtd';
      q.style.cssText = 'position:absolute;bottom:1px;right:3px;font-size:11px;color:#fff';
      q.textContent = it.q;
      s.appendChild(q);
    }
    g.appendChild(s);
  }
  
  const cg = document.getElementById('craft-grid');
  cg.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const s = document.createElement('div');
    s.className = 'inv-slot';
    s.style.cssText = 'width:46px;height:46px;background:#1a1a1a;border:2px solid #444;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative';
    const it = P.craft[i];
    if (it.id > 0 && BLK[it.id]) {
      const b = document.createElement('div');
      b.className = 'blk';
      b.style.background = BLK[it.id].color;
      b.style.width = '32px';
      b.style.height = '32px';
      s.appendChild(b);
    }
    if (it.q > 0) {
      const q = document.createElement('span');
      q.className = 'qtd';
      q.style.cssText = 'position:absolute;bottom:1px;right:3px;font-size:11px;color:#fff';
      q.textContent = it.q;
      s.appendChild(q);
    }
    cg.appendChild(s);
  }
  calcCraft();
}

function calcCraft() {
  P.out = null;
  const m = new Map();
  for (const it of P.craft) if (it.id > 0) m.set(it.id, (m.get(it.id) || 0) + it.q);
  for (const r of REC) {
    let ok = true;
    for (const [id, qty] of Object.entries(r.need))
      if ((m.get(+id) || 0) < qty) { ok = false; break; }
    if (ok) { P.out = { id: r.result, q: r.count }; return; }
  }
}

document.getElementById('craft-btn').addEventListener('click', () => {
  if (!P.out) return;
  const r = REC.find(x => x.result === P.out.id);
  if (!r) return;
  for (const [id, qty] of Object.entries(r.need)) {
    let need = qty;
    for (const it of P.craft) {
      if (need <= 0) break;
      if (it.id === +id) {
        const take = Math.min(it.q, need);
        it.q -= take;
        need -= take;
        if (it.q <= 0) it.id = 0;
      }
    }
  }
  addInv(P.out.id, P.out.q);
  P.out = null;
  calcCraft();
  updInv();
});

function addInv(id, q) {
  for (const it of P.inv) {
    if (it.id === id && it.q < 64) {
      const sp = 64 - it.q;
      const a = Math.min(sp, q);
      it.q += a; q -= a;
      if (q <= 0) return;
    }
  }
  for (const it of P.inv) {
    if (it.id === 0) { it.id = id; it.q = q; return; }
  }
}

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') {
    P.open = !P.open;
    document.getElementById('inv').classList.toggle('open', P.open);
    if (P.open) document.exitPointerLock();
    else canvas.requestPointerLock();
    if (P.open) updInv();
  }
  if (e.code === 'KeyR') { P.x = 0; P.y = 10; P.z = 0; P.vy = 0; }
  if (e.code >= 'Digit1' && e.code <= 'Digit9') { P.sel = +e.code[5] - 1; updHud(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.addEventListener('mousemove', e => {
  if (document.pointerLockElement === canvas) {
    P.yaw -= e.movementX * SENS;
    P.pitch += e.movementY * SENS;
    P.pitch = Math.max(-1.4, Math.min(1.4, P.pitch));
  }
});

canvas.addEventListener('click', () => { if (!P.open) canvas.requestPointerLock(); });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('mousedown', e => {
  if (document.pointerLockElement !== canvas) return;
  const dx = Math.sin(P.yaw) * Math.cos(P.pitch);
  const dy = Math.sin(P.pitch);
  const dz = Math.cos(P.yaw) * Math.cos(P.pitch);
  const h = ray(P.x, P.y + EYE, P.z, dx, dy, dz, 5);
  if (!h) return;
  if (e.button === 0) {
    const id = gB(h.x, h.y, h.z);
    if (id > 0) { addInv(id, 1); sB(h.x, h.y, h.z, 0); }
  } else {
    const held = P.hot[P.sel];
    if (held > 0) {
      const nx = h.x + (dx > 0 ? 1 : dx < 0 ? -1 : 0);
      const ny = h.y + (dy > 0 ? 1 : dy < 0 ? -1 : 0);
      const nz = h.z + (dz > 0 ? 1 : dz < 0 ? -1 : 0);
      if (gB(nx, ny, nz) === 0) sB(nx, ny, nz, held);
    }
  }
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let lt = performance.now();
function loop() {
  const now = performance.now();
  const dt = Math.min((now - lt) / 1000, 0.05);
  lt = now;

  if (!P.open) {
    const fx = Math.sin(P.yaw), fz = Math.cos(P.yaw);
    const rx = Math.cos(P.yaw), rz = -Math.sin(P.yaw);
    let mx = (keys.KeyW ? fx : 0) - (keys.KeyS ? fx : 0) + (keys.KeyD ? rx : 0) - (keys.KeyA ? rx : 0);
    let mz = (keys.KeyW ? fz : 0) - (keys.KeyS ? fz : 0) + (keys.KeyD ? rz : 0) - (keys.KeyA ? rz : 0);
    const len = Math.sqrt(mx * mx + mz * mz);
    if (len > 0) {
      const spd = SPD * dt / len;
      P.x += mx * spd;
      if (col(P.x, P.y, P.z)) P.x -= mx * spd;
      P.z += mz * spd;
      if (col(P.x, P.y, P.z)) P.z -= mz * spd;
    }

    if (keys.Space && P.ground) { P.y += JUMP; P.ground = false; }
    P.vy -= GRAV * dt;
    P.y += P.vy * dt;
    if (col(P.x, P.y, P.z)) {
      if (P.vy < 0) P.ground = true;
      P.y -= P.vy * dt;
      P.vy = 0;
    } else P.ground = false;

    if (P.y < -20) { P.x = 0; P.y = 10; P.z = 0; P.vy = 0; }
  }

  render();
  updHud();
  requestAnimationFrame(loop);
}

gen();
updHud();
loop();
</script>
</body>
</html>
